---
# fireball_enterprise_shopify Properties
# Central configuration for all scripts and automation
# Stamped repos: update repo.local/repo.remote to the new repo's name.

repo:
  local: "$HOME/Development/fireballenterprise/fireball_enterprise_shopify"
  remote: "github.com/fireballenterprise/fireball_enterprise_shopify"

shopify:
  local_config: "tmp/.shopify/config.yml"

# Where /sync-setup pulls skeleton updates from.
skeleton:
  local: "$HOME/Development/levonbecker/template_python"
  remote: "github.com/LevonBecker/template_python"
