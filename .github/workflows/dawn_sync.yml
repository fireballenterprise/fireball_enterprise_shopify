---
name: Dawn Sync
run-name: "Dawn Sync (dawn_vanilla - ${{ inputs.version || 'latest' }})"

# Thin caller — logic lives in fireballenterprise/workflows (floating major tag @v1).
# Syncs the dawn_vanilla branch with upstream Shopify/dawn. Merging dawn_vanilla
# into development stays a deliberate manual step.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Upstream Dawn tag to sync to (e.g. v15.5.0), or "latest"'
        required: false
        type: string
        default: latest

jobs:
  dawn_sync:
    # Called workflows can't elevate beyond the caller's grant, and the repo
    # default is read-only — the sync job pushes to dawn_vanilla
    permissions:
      contents: write
    uses: fireballenterprise/workflows/.github/workflows/dawn_sync.yml@v1
    with:
      version: ${{ inputs.version || 'latest' }}
