---
name: Release
run-name: "Release"

# Thin caller — logic lives in fireballenterprise/workflows (floating major tag @1).

on:
  workflow_dispatch:

jobs:
  release:
    # Called workflows can't elevate beyond the caller's grant, and the repo
    # default is read-only — promote pushes main, publish creates the Release
    permissions:
      contents: write
    uses: fireballenterprise/workflows/.github/workflows/release.yml@1
    secrets: inherit
